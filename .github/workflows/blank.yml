name: VPS Full Connection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      vps_ip:
        description: 'VPS IP Address'
        required: false
        type: string
      vps_port:
        description: 'SSH Port'
        required: false
        default: '22'
        type: string
      vps_user:
        description: 'SSH Username'
        required: false
        default: 'root'
        type: string
      vps_pass:
        description: 'SSH Password'
        required: false
        default: 'root'
        type: string

jobs:
  vps-connection:
    name: VPS Connection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Install SSH Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass openssh-client netcat-openbsd
          echo "✅ SSH tools installed"
      
      - name: Set Connection Parameters
        run: |
          # !!! CHANGE THIS TO YOUR VPS IP !!!
          DEFAULT_IP="your-vps-ip-here"
          DEFAULT_PORT="22"
          DEFAULT_USER="root"
          DEFAULT_PASS="root"
          
          if [[ -n "${{ github.event.inputs.vps_ip }}" ]]; then
            VPS_IP="${{ github.event.inputs.vps_ip }}"
            VPS_PORT="${{ github.event.inputs.vps_port }}"
            VPS_USER="${{ github.event.inputs.vps_user }}"
            VPS_PASS="${{ github.event.inputs.vps_pass }}"
          else
            VPS_IP="$DEFAULT_IP"
            VPS_PORT="$DEFAULT_PORT"
            VPS_USER="$DEFAULT_USER"
            VPS_PASS="$DEFAULT_PASS"
          fi
          
          echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          echo "VPS_PORT=$VPS_PORT" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "VPS_PASS=$VPS_PASS" >> $GITHUB_ENV
          
          echo "========================================="
          echo "CONNECTION DETAILS"
          echo "========================================="
          echo "IP: $VPS_IP"
          echo "Port: $VPS_PORT"
          echo "User: $VPS_USER"
          echo ""
          
          if [[ "$VPS_IP" == "your-vps-ip-here" ]]; then
            echo "❌ ERROR: Please set your VPS IP in the workflow file"
            exit 1
          fi
      
      - name: Test Connectivity
        run: |
          echo "========================================="
          echo "TESTING CONNECTION"
          echo "========================================="
          
          if nc -zv -w 5 $VPS_IP $VPS_PORT 2>&1 | grep -q "succeeded"; then
            echo "✅ Port $VPS_PORT is open"
          else
            echo "❌ Cannot connect to $VPS_IP on port $VPS_PORT"
            echo "Check:"
            echo "  - VPS is running"
            echo "  - SSH service is enabled"
            echo "  - Firewall allows port $VPS_PORT"
            exit 1
          fi
      
      - name: Create Log Directory
        run: |
          mkdir -p logs
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          LOG_FILE="logs/connection_${TIMESTAMP}.log"
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          echo "📁 Log file: $LOG_FILE"
      
      - name: Connect to VPS
        run: |
          echo "========================================="
          echo "CONNECTING TO VPS"
          echo "========================================="
          echo "Time: $(date)"
          echo ""
          
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $VPS_PORT \
            $VPS_USER@$VPS_IP '
            echo "========================================="
            echo "✅ CONNECTED SUCCESSFULLY"
            echo "========================================="
            echo ""
            
            echo "📋 SYSTEM INFORMATION"
            echo "---------------------"
            echo "Hostname: $(hostname)"
            echo "OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d "\"")"
            echo "Kernel: $(uname -r)"
            echo "Uptime: $(uptime -p)"
            echo "Load: $(uptime | awk -F"load average:" "{print $2}")"
            echo ""
            
            echo "💾 MEMORY USAGE"
            echo "---------------"
            free -h
            echo ""
            
            echo "💽 DISK USAGE"
            echo "-------------"
            df -h
            echo ""
            
            echo "🌐 NETWORK"
            echo "----------"
            echo "IPs: $(hostname -I)"
            echo ""
            echo "Open Ports:"
            ss -tuln | grep LISTEN | head -10
            echo ""
            
            echo "👥 USERS"
            echo "--------"
            echo "Logged in:"
            who || echo "No users"
            echo ""
            
            echo "📅 DATE"
            echo "-------"
            echo "$(date)"
            echo ""
            echo "========================================="
          ' | tee $LOG_FILE
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "STATUS=success" >> $GITHUB_ENV
            echo "✅ SSH connection successful"
          else
            echo "STATUS=failed" >> $GITHUB_ENV
            echo "❌ SSH connection failed"
          fi
      
      - name: Create Summary Report
        if: always()
        run: |
          SUMMARY_FILE="logs/summary_$(date +%Y%m%d_%H%M%S).txt"
          
          cat > $SUMMARY_FILE << EOF
╔══════════════════════════════════════════════════════════════╗
║                 VPS CONNECTION SUMMARY                       ║
╚══════════════════════════════════════════════════════════════╝

📅 DATE: $(date)
🆔 RUN: ${{ github.run_number }}

🔌 CONNECTION DETAILS:
   • IP: $VPS_IP
   • Port: $VPS_PORT
   • User: $VPS_USER
   • Status: ${{ env.STATUS }}

⏰ SCHEDULE:
   • Frequency: Every 6 hours
   • Daily runs: 4
   • 30-day total: 120 runs
   • Next run: $(date -d '+6 hours' 2>/dev/null || echo "in 6 hours")

📁 LOGS:
   • Connection: $LOG_FILE
   • Summary: $SUMMARY_FILE

════════════════════════════════════════════════════════════════
EOF
          
          cat $SUMMARY_FILE
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
      
      - name: Final Status
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "         WORKFLOW COMPLETE"
          echo "════════════════════════════════════════"
          echo ""
          echo "VPS: $VPS_IP:$VPS_PORT"
          echo "User: $VPS_USER"
          echo "Status: ${{ env.STATUS }}"
          echo "Time: $(date)"
          echo "Run: ${{ github.run_number }}"
          echo ""
          echo "Next run in 6 hours"
          echo "════════════════════════════════════════"

  health-check:
    name: Health Check
    needs: vps-connection
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check Status
        run: |
          echo "========================================="
          echo "HEALTH CHECK"
          echo "========================================="
          echo ""
          echo "Workflow: ${{ needs.vps-connection.result }}"
          echo ""
          
          if [ "${{ needs.vps-connection.result }}" == "success" ]; then
            echo "✅ All systems operational"
          else
            echo "⚠️ Connection issues detected"
          fi
          
          echo ""
          echo "Progress: ${{ github.run_number }}/120 runs"
          echo "========================================="
