name: Debug VPS Connection

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  diagnose:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Environment Variables
        run: |
          echo "Checking if secrets are available..."
          echo "VPS_HOST is ${{ secrets.VPS_HOST != '' && 'SET' || 'NOT SET' }}"
          echo "VPS_USER is ${{ secrets.VPS_USER != '' && 'SET' || 'NOT SET' }}"
          echo "VPS_SSH_KEY is ${{ secrets.VPS_SSH_KEY != '' && 'SET' || 'NOT SET' }}"
          
          # Don't print actual values, just lengths
          if [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "SSH Key length: ${#VPS_SSH_KEY} characters"
          fi
      
      - name: Create SSH directory and setup
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Try to save SSH key
          if [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            echo "✅ SSH key saved"
          else
            echo "❌ No SSH key provided"
            exit 1
          fi
      
      - name: Validate SSH Key Format
        run: |
          echo "Checking SSH key format..."
          
          # Check if file exists
          if [ ! -f ~/.ssh/id_rsa ]; then
            echo "❌ SSH key file not found"
            exit 1
          fi
          
          # Check key format
          if grep -q "BEGIN" ~/.ssh/id_rsa; then
            echo "✅ Key contains BEGIN marker"
          else
            echo "❌ Key missing BEGIN marker - invalid format"
            echo "First 50 chars of key:"
            head -c 50 ~/.ssh/id_rsa
            echo ""
            exit 1
          fi
          
          # Try to parse key
          ssh-keygen -l -f ~/.ssh/id_rsa 2>&1 || {
            echo "❌ Failed to parse SSH key - invalid format"
            echo "Make sure it's a valid private key (RSA, ED25519, etc.)"
            exit 1
          }
          
          echo "✅ SSH key format is valid"
      
      - name: Test SSH Connection
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "❌ Missing VPS_HOST or VPS_USER"
            exit 1
          fi
          
          echo "Adding host to known_hosts..."
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          
          echo "Testing SSH connection with verbose output..."
          echo "=========================================="
          ssh -v -o ConnectTimeout=10 \
                -o StrictHostKeyChecking=no \
                -o BatchMode=yes \
                ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo 'SSH connection successful'" 2>&1
          
          EXIT_CODE=$?
          echo "=========================================="
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ SSH connection successful!"
          else
            echo "❌ SSH connection failed with exit code: $EXIT_CODE"
            echo ""
            echo "Common issues:"
            echo "1. Wrong host/IP: ${{ secrets.VPS_HOST }}"
            echo "2. Wrong username: ${{ secrets.VPS_USER }}"
            echo "3. SSH key not authorized on server"
            echo "4. Firewall blocking port 22"
            echo "5. SSH service not running on VPS"
            exit 1
          fi
      
      - name: Get System Info (if connection successful)
        if: success()
        run: |
          echo "Getting system information from VPS..."
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo 'Hostname: ' \$(hostname)
            echo 'OS: ' \$(cat /etc/os-release | grep PRETTY_NAME | cut -d'=' -f2 | tr -d '\"')
            echo 'Kernel: ' \$(uname -r)
            echo 'Uptime: ' \$(uptime)
            echo 'Whoami: ' \$(whoami)
            echo 'Home: ' \$HOME
            echo 'SSH authorized_keys: ' \$(test -f ~/.ssh/authorized_keys && echo 'Exists' || echo 'Not found')
          "