name: Tmate Terminal with Retry

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install tmate with retry
        run: |
          # Retry up to 3 times with delay
          for i in {1..3}; do
            echo "Attempt $i to install tmate..."
            if sudo apt-get update && sudo apt-get install -y tmate; then
              echo "✅ Installation successful"
              break
            else
              if [ $i -eq 3 ]; then
                echo "❌ Failed after 3 attempts"
                exit 1
              fi
              echo "Attempt failed, waiting 30 seconds before retry..."
              sleep 30
            fi
          done
      
      - name: Start tmate session
        run: |
          # Generate SSH key
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
          
          # Start tmate
          tmate -S /tmp/tmate.sock new-session -d
          
          # Wait for connection
          echo "Waiting for tmate to connect..."
          MAX_WAIT=60
          COUNTER=0
          while [ $COUNTER -lt $MAX_WAIT ]; do
            sleep 2
            SSH_CMD=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
            if [ -n "$SSH_CMD" ]; then
              break
            fi
            echo -n "."
            COUNTER=$((COUNTER + 1))
          done
          
          if [ -n "$SSH_CMD" ]; then
            echo ""
            echo "==========================================="
            echo "✅ TMATE SESSION READY"
            echo "==========================================="
            echo ""
            echo "📱 SSH Command for Termius:"
            echo "$SSH_CMD"
            echo ""
            echo "==========================================="
            echo "Session active for 6 hours"
            echo "==========================================="
          else
            echo ""
            echo "❌ Failed to get tmate connection"
            exit 1
          fi
          
          # Keep alive
          while true; do
            sleep 60
            echo "Session active - $(date)"
          done