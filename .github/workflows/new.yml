name: Tmate Web Terminal

on: workflow_dispatch

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install tmate
        run: |
          sudo apt-get update
          sudo apt-get install -y tmate
          echo "✅ tmate installed"
      
      - name: Generate fresh keys
        run: |
          # Completely clean and regenerate
          rm -rf ~/.ssh
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N "" -q
          echo "✅ SSH keys regenerated"
      
      - name: Start tmate and get web URL
        run: |
          # Start tmate in background
          tmate -S /tmp/tmate.sock new-session -d
          
          # Wait for connection
          echo "Waiting for tmate to connect..."
          for i in {1..30}; do
            sleep 2
            if tmate -S /tmp/tmate.sock wait tmate-ready 2>/dev/null; then
              break
            fi
            echo -n "."
          done
          echo ""
          
          # Get web URL (easier than SSH)
          WEB_URL=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
          
          echo "==========================================="
          echo "✅ TERMINAL READY - USE WEB URL"
          echo "==========================================="
          echo ""
          echo "🌐 OPEN THIS IN YOUR BROWSER:"
          echo "$WEB_URL"
          echo ""
          echo "==========================================="
          echo "No SSH needed - just click the link above"
          echo "Session active for 6 hours"
          echo "==========================================="
          
          # Keep alive
          while true; do
            sleep 60
            echo "Terminal active - $(date)"
          done