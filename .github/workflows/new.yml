name: Tmate Terminal with Clear Output

on: workflow_dispatch

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install tmate
        run: |
          sudo apt-get update
          sudo apt-get install -y tmate
          
      - name: Generate SSH key
        run: |
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
          
      - name: Start tmate and show connection
        run: |
          # Start tmate
          tmate -S /tmp/tmate.sock new-session -d
          
          # Wait for connection
          echo "Waiting for tmate to connect..."
          while true; do
            sleep 2
            SSH_CMD=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
            if [ -n "$SSH_CMD" ]; then
              break
            fi
            echo -n "."
          done
          
          # Get connection info
          SSH_CMD=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          WEB_URL=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
          
          # Display prominently
          echo "==========================================="
          echo "    TMATE CONNECTION DETAILS"
          echo "==========================================="
          echo ""
          echo "📱 TERMIUS SSH COMMAND:"
          echo "$SSH_CMD"
          echo ""
          echo "🌐 WEB URL (if needed):"
          echo "$WEB_URL"
          echo ""
          echo "==========================================="
          echo "Copy the SSH command and paste in Termius"
          echo "Session active for 6 hours"
          echo "==========================================="
          
          # Save to file
          echo "$SSH_CMD" > ~/tmate-connection.txt
          
          # Keep running
          echo ""
          echo "Keeping session alive... (press Ctrl+C to stop)"
          while true; do
            sleep 60
            echo "Session still active - $(date)"
          done