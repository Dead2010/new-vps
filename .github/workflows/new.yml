name: Tmate Terminal

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max
    
    steps:
      - name: Install tmate
        run: |
          sudo apt-get update
          sudo apt-get install -y tmate
          echo "✅ tmate installed"
      
      - name: Start tmate session
        run: |
          # Start tmate
          tmate -S /tmp/tmate.sock new-session -d
          
          # Wait for session to be ready
          echo "Waiting for tmate session to initialize..."
          for i in {1..30}; do
            if tmate -S /tmp/tmate.sock wait tmate-ready 2>/dev/null; then
              break
            fi
            sleep 2
            echo -n "."
          done
          echo ""
          
          # Get connection string
          SSH_CMD=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          
          # Display connection info
          echo "==========================================="
          echo "🔴 TMATE TERMINAL READY"
          echo "==========================================="
          echo ""
          echo "📱 COPY THIS SSH COMMAND:"
          echo "$SSH_CMD"
          echo ""
          echo "==========================================="
          echo "Paste the above command in Termius"
          echo "Session active for 6 hours"
          echo "==========================================="
          
          # Save to file
          echo "$SSH_CMD" > tmate-connection.txt
      
      - name: Upload connection info
        uses: actions/upload-artifact@v4
        with:
          name: tmate-connection
          path: tmate-connection.txt
          retention-days: 1
      
      - name: Keep terminal alive
        run: |
          echo "✅ Terminal is running"
          echo "Connection string saved in artifacts"
          echo ""
          echo "Press Ctrl+C to stop, or wait 6 hours for auto-stop"
          echo ""
          # Keep running
          while true; do
            echo "Terminal active - $(date)"
            sleep 60
          done