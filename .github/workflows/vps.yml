name: VPS 30-Day Connection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      manual_ip:
        description: 'Enter your VPS IP (leave empty to auto-detect)'
        required: false
        type: string

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd curl
          echo "✅ SSH tools installed"
      
      - name: Get VPS IP
        id: get_ip
        run: |
          echo "========================================="
          echo "🌐 CONFIGURING VPS IP"
          echo "========================================="
          echo ""
          
          # Check if manual IP was provided
          if [[ -n "${{ github.event.inputs.manual_ip }}" ]]; then
            VPS_IP="${{ github.event.inputs.manual_ip }}"
            echo "✅ Using manually entered IP: $VPS_IP"
          else
            # Auto-detect IP
            echo "📡 Auto-detecting public IP..."
            VPS_IP=$(curl -s --max-time 5 ifconfig.me 2>/dev/null || echo "")
            
            if [[ -n "$VPS_IP" && "$VPS_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "✅ Auto-detected IP: $VPS_IP"
            else
              echo "❌ Could not detect IP automatically"
              echo "⚠️  Using localhost as fallback"
              VPS_IP="127.0.0.1"
            fi
          fi
          
          echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          echo ""
          echo "📝 Using IP: $VPS_IP"
          echo "========================================="
      
      - name: Show Connection Details
        run: |
          echo "========================================="
          echo "           📍 SSH CONNECTION"
          echo "========================================="
          echo ""
          echo "   ➜ VPS IP:    $VPS_IP"
          echo "   ➜ PORT:      22"
          echo "   ➜ USER:      root"
          echo "   ➜ PASSWORD:  root"
          echo ""
          echo "   🔗 Connect manually:"
          echo "   ssh root@$VPS_IP -p 22"
          echo ""
          echo "========================================="
      
      - name: Test Connection
        run: |
          echo "🔍 Testing connection to $VPS_IP on port 22..."
          
          if nc -zv -w 5 $VPS_IP 22 2>&1 | grep -q "succeeded"; then
            echo "✅ Port 22 is open on $VPS_IP"
            echo "PORT_OPEN=true" >> $GITHUB_ENV
          else
            echo "❌ Port 22 is not accessible on $VPS_IP"
            echo "PORT_OPEN=false" >> $GITHUB_ENV
            echo ""
            echo "🔧 Troubleshooting:"
            echo "  1. Is this the correct VPS IP? $VPS_IP"
            echo "  2. Is your VPS running?"
            echo "  3. Is SSH enabled? (systemctl status ssh)"
            echo "  4. Is firewall allowing port 22? (ufw status)"
          fi
      
      - name: Connect to VPS
        if: env.PORT_OPEN == 'true'
        run: |
          echo "========================================="
          echo "🚀 CONNECTING TO $VPS_IP"
          echo "========================================="
          
          sshpass -p "root" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p 22 \
            root@$VPS_IP "
            echo '✅ CONNECTED SUCCESSFULLY'
            echo 'Hostname: ' \$(hostname)
            echo 'Uptime: ' \$(uptime -p)
            echo 'Memory:'
            free -h
            echo 'Disk:'
            df -h
          " || echo "❌ Connection failed"
      
      - name: Save IP to Log
        if: always()
        run: |
          mkdir -p logs
          echo "Run #${{ github.run_number }}" > logs/run.txt
          echo "Date: $(date)" >> logs/run.txt
          echo "VPS IP: $VPS_IP" >> logs/run.txt
          echo "Status: ${{ job.status }}" >> logs/run.txt
          echo "$VPS_IP" > logs/vps-ip.txt
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
