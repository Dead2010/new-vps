name: VPS 30-Day Connection with SSHX

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Install SSH Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd traceroute curl
          sudo systemctl start ssh || sudo service ssh start
          echo "вң… SSH tools installed"
      
      - name: Set VPS Details
        run: |
          # Using localhost IP
          VPS_IP="127.0.0.1"
          VPS_PORT="22"
          VPS_USER="root"
          VPS_PASS="root"
          
          echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          echo "VPS_PORT=$VPS_PORT" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "VPS_PASS=$VPS_PASS" >> $GITHUB_ENV
          
          echo "========================================="
          echo "     рҹ”Ң SSH CONNECTION DETAILS"
          echo "========================================="
          echo ""
          echo "   рҹҢҗ SSH IP ADDRESS:    $VPS_IP"
          echo "   рҹ”ў SSH PORT:          $VPS_PORT"
          echo "   рҹ‘Ө SSH USERNAME:      $VPS_USER"
          echo "   рҹ”‘ SSH PASSWORD:      [HIDDEN]"
          echo ""
          echo "   рҹ“қ Full SSH Command:"
          echo "   ssh $VPS_USER@$VPS_IP -p $VPS_PORT"
          echo ""
          echo "========================================="
      
      - name: Show SSH IP
        run: |
          echo "========================================="
          echo "           рҹ“Қ SSH IP ADDRESS"
          echo "========================================="
          echo ""
          echo "   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—"
          echo "   в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ"
          echo "   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—"
          echo "   в–Ҳв–Ҳв•”в•җв•җв•җв•қ в–Ҳв–Ҳв•”в•җв•җв•қ  в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘"
          echo "   в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘"
          echo "   в•ҡв•җв•қ     в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ"
          echo ""
          echo "   вһң IP: $VPS_IP"
          echo "   вһң PORT: $VPS_PORT"
          echo "   вһң USER: $VPS_USER"
          echo ""
          echo "   рҹ”— Quick Connect:"
          echo "   ssh $VPS_USER@$VPS_IP -p $VPS_PORT"
          echo ""
          echo "========================================="
      
      - name: Setup Local SSH
        run: |
          echo "root:root" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh || sudo service ssh restart
          echo "вң… Local SSH configured"
      
      - name: Test Local Connection
        run: |
          echo "рҹ”Қ Testing connection to $VPS_IP on port $VPS_PORT..."
          
          echo "рҹ“Ў Test 1: Ping Test"
          if ping -c 2 -W 3 $VPS_IP > /dev/null 2>&1; then
            echo "   вң… $VPS_IP is reachable"
          else
            echo "   вҡ пёҸ  $VPS_IP not responding to ping"
          fi
          echo ""
          
          echo "рҹ“Ў Test 2: Port $VPS_PORT Test"
          if nc -zv -w 5 $VPS_IP $VPS_PORT 2>&1 | grep -q "succeeded"; then
            echo "   вң… Port $VPS_PORT is open on $VPS_IP"
            echo "PORT_OPEN=true" >> $GITHUB_ENV
          else
            echo "   вқҢ Port $VPS_PORT is not accessible on $VPS_IP"
            echo "PORT_OPEN=false" >> $GITHUB_ENV
          fi
      
      - name: Connect to VPS
        if: env.PORT_OPEN == 'true'
        run: |
          echo "========================================="
          echo "рҹҡҖ CONNECTING TO $VPS_IP:$VPS_PORT"
          echo "========================================="
          echo ""
          
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $VPS_PORT \
            $VPS_USER@$VPS_IP "
            echo 'вң… SUCCESSFULLY CONNECTED TO $VPS_IP'
            echo '========================================='
            echo ''
            echo 'рҹ“Ӣ SYSTEM INFORMATION:'
            echo '  Hostname: ' \$(hostname)
            echo '  OS: ' \$(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')
            echo '  Kernel: ' \$(uname -r)
            echo '  Uptime: ' \$(uptime -p)
            echo ''
            echo 'рҹ’ҫ MEMORY USAGE:'
            free -h
            echo ''
            echo 'рҹ’Ҫ DISK USAGE:'
            df -h
            echo ''
            echo 'рҹҢҗ IP ADDRESSES:'
            hostname -I
            echo ''
            echo 'рҹ‘Ҙ LOGGED IN USERS:'
            who || echo '  No users'
            echo ''
            echo 'рҹ“… CURRENT TIME:'
            date
            echo '========================================='
          " || echo "вқҢ Connection to $VPS_IP failed"
      
      - name: Install and Run SSHX
        if: env.PORT_OPEN == 'true'
        run: |
          echo "========================================="
          echo "рҹ”— INSTALLING SSHX.IO"
          echo "========================================="
          echo ""
          
          # Install sshx
          curl -sSf https://sshx.io/get | sh
          
          echo ""
          echo "вң… SSHX installed successfully"
          echo ""
          echo "========================================="
          echo "рҹҡҖ STARTING SSHX SESSION"
          echo "========================================="
          echo ""
          
          # Run sshx in the background with a timeout
          # This will create a shareable terminal session
          sshx run &
          SSHX_PID=$!
          
          # Give it a few seconds to start
          sleep 5
          
          echo ""
          echo "рҹ“Ў SSHX session is running in background"
          echo "рҹ“қ Session URL will be displayed in the logs"
          echo ""
          echo "вҡ пёҸ  Note: The session will run for the duration"
          echo "   of this workflow step (max 5-10 minutes)"
          echo ""
          
          # Keep it running for a while to allow connections
          echo "Session active for 300 seconds..."
          sleep 300
          
          # Kill the sshx process
          kill $SSHX_PID 2>/dev/null || true
          echo "вң… SSHX session ended"
      
      - name: Alternative SSHX Method (Background)
        if: env.PORT_OPEN == 'true'
        continue-on-error: true
        run: |
          echo "========================================="
          echo "рҹ”„ ALTERNATIVE SSHX METHOD"
          echo "========================================="
          echo ""
          
          # Try running with specific region if needed
          curl -sSf https://sshx.io/get | sh -s run --region us &
          
          echo "SSHX started in background with US region"
          echo "Check workflow logs for the session URL"
      
      - name: Display Connection Summary
        if: always()
        run: |
          echo ""
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo "           CONNECTION SUMMARY"
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
          echo ""
          echo "   рҹҢҗ SSH IP:        $VPS_IP"
          echo "   рҹ”ў SSH Port:      $VPS_PORT"
          echo "   рҹ‘Ө SSH User:      $VPS_USER"
          echo "   рҹ“Ҡ Status:        ${{ job.status }}"
          echo "   рҹ”— SSHX:          Installed & Run"
          echo ""
          echo "   рҹ”— Connection String:"
          echo "   ssh $VPS_USER@$VPS_IP -p $VPS_PORT"
          echo ""
          echo "   рҹ“Ғ Logs saved to artifact: vps-logs-run-${{ github.run_number }}"
          echo ""
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
      
      - name: Save Log
        if: always()
        run: |
          mkdir -p logs
          echo "=========================================" > logs/connection.log
          echo "VPS CONNECTION LOG - RUN #${{ github.run_number }}" >> logs/connection.log
          echo "=========================================" >> logs/connection.log
          echo "Date: $(date)" >> logs/connection.log
          echo "SSH IP: $VPS_IP" >> logs/connection.log
          echo "SSH Port: $VPS_PORT" >> logs/connection.log
          echo "SSH User: $VPS_USER" >> logs/connection.log
          echo "SSHX: Installed and Run" >> logs/connection.log
          echo "Status: ${{ job.status }}" >> logs/connection.log
          echo "=========================================" >> logs/connection.log
          
          echo "IP: $VPS_IP" > logs/ssh-ip.txt
          echo "Port: $VPS_PORT" >> logs/ssh-ip.txt
          echo "User: $VPS_USER" >> logs/ssh-ip.txt
          echo "Command: ssh $VPS_USER@$VPS_IP -p $VPS_PORT" >> logs/ssh-ip.txt
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
      
      - name: Next Run Info
        run: |
          echo ""
          echo "========================================="
          echo "вң… WORKFLOW COMPLETE"
          echo "========================================="
          echo "рҹ“… Completed at: $(date)"
          echo "вҸ° Next run in: 6 hours"
          echo "рҹ“Ҷ 30-day schedule: Active"
          echo "рҹ”ў Run #: ${{ github.run_number }}"
          echo "рҹҢҗ Connected to: $VPS_IP"
          echo "рҹ”— SSHX: Session was started"
          echo "========================================="
