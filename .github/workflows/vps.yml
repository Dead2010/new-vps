name: Docker VPS with Ngrok - 8 Hour Sessions

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Your ngrok auth token'
        required: true
        default: '3AGZkWMXr7YsLclerO066IEYFLt_4KXrzELfETgqD3yED9qku'
        type: string

jobs:
  create-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 500
    
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass curl netcat-openbsd
          echo "✅ Tools installed"
      
      - name: Create Docker Container with SSH
        run: |
          # Remove old container if exists
          docker stop vps-container 2>/dev/null || true
          docker rm vps-container 2>/dev/null || true
          
          # Create fresh container with SSH pre-installed
          docker run -d --name vps-container \
            -p 2222:22 \
            -p 8080:80 \
            -p 8443:443 \
            -p 8888:8080 \
            -p 54321:54321 \
            ubuntu:22.04 \
            bash -c "
              apt-get update && 
              apt-get install -y openssh-server && 
              echo 'root:12345678' | chpasswd && 
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && 
              sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && 
              service ssh start && 
              tail -f /dev/null
            "
          
          echo "✅ Container created"
          echo "Waiting for SSH to start..."
          sleep 15
      
      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH service to be fully ready..."
          for i in {1..10}; do
            if nc -zv localhost 2222 2>&1 | grep -q succeeded; then
              echo "✅ SSH port is open"
              break
            fi
            echo "Attempt $i: SSH not ready yet..."
            sleep 5
          done
          
          # Test SSH connection
          for i in {1..5}; do
            if sshpass -p '12345678' ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=5 \
              -p 2222 \
              root@localhost "echo 'SSH is ready'" 2>/dev/null; then
              echo "✅ SSH is fully operational"
              exit 0
            fi
            echo "Attempt $i: SSH authentication not ready..."
            sleep 5
          done
      
      - name: Verify Container Details
        run: |
          echo "Container Status:"
          docker ps | grep vps-container
          echo ""
          echo "SSH Process in Container:"
          docker exec vps-container ps aux | grep ssh
          echo ""
          echo "SSH Listening Ports:"
          docker exec vps-container netstat -tlnp | grep :22 || echo "SSH not listening yet"
      
      - name: Install Ngrok
        run: |
          # Download and install ngrok
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          sudo mv ngrok /usr/local/bin/ngrok
          
          # Add auth token
          ngrok config add-authtoken "${{ github.event.inputs.ngrok_token }}"
          echo "✅ Ngrok configured"
      
      - name: Start Ngrok SSH Tunnel
        run: |
          # Start ngrok tunnel for SSH
          ngrok tcp 2222 --log=stdout > ngrok.log 2>&1 &
          NGROK_PID=$!
          sleep 10
          
          # Get the public URL
          curl -s http://localhost:4040/api/tunnels > tunnels.json
          cat tunnels.json
          
          NGROK_URL=$(cat tunnels.json | grep -o 'tcp://[0-9.]*:[0-9]*' | head -1)
          NGROK_HOST=$(echo $NGROK_URL | cut -d/ -f3 | cut -d: -f1)
          NGROK_PORT=$(echo $NGROK_URL | cut -d: -f4)
          
          echo ""
          echo "██████████████████████████████████████████████████████████████"
          echo "██                                                          ██"
          echo "██           ✅ NGROK VPS IS READY                          ██"
          echo "██                                                          ██"
          echo "██████████████████████████████████████████████████████████████"
          echo ""
          echo "📱 TERMIUS CONNECTION DETAILS (8 HOUR SESSION):"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "   🌐 Hostname: $NGROK_HOST"
          echo "   🔢 Port:     $NGROK_PORT"
          echo "   👤 Username: root"
          echo "   🔑 Password: 12345678"
          echo ""
          echo "   📋 COPY THESE EXACT VALUES INTO TERMIUS"
          echo ""
          echo "🔗 Direct SSH Command:"
          echo "   ssh root@$NGROK_HOST -p $NGROK_PORT"
          echo ""
          echo "🖥️  Local Access (for testing):"
          echo "   ssh root@localhost -p 2222"
          echo ""
          echo "🌐 Web Ports (via localhost only):"
          echo "   • HTTP:  http://localhost:8080"
          echo "   • HTTPS: https://localhost:8443"
          echo "   • App:   http://localhost:8888"
          echo "   • Panel: http://localhost:54321"
          echo ""
          echo "⏱️  Session active for: 8 HOURS"
          echo "   Started at: $(date)"
          echo "   Ends at:    $(date -d '+8 hours')"
          echo ""
          
          # Save to file
          echo "$NGROK_HOST" > ngrok-host.txt
          echo "$NGROK_PORT" > ngrok-port.txt
          echo "root" > ngrok-user.txt
          echo "12345678" > ngrok-pass.txt
          
          # Test the ngrok tunnel
          echo ""
          echo "🔍 Testing ngrok tunnel..."
          sleep 5
          sshpass -p '12345678' ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $NGROK_PORT \
            root@$NGROK_HOST "echo '✅ Ngrok tunnel is working!'" || \
            echo "⚠️  Ngrok tunnel test failed - but will retry"
          
          # Keep alive for 8 hours
          echo ""
          echo "⏳ Tunnel running for 8 hours..."
          sleep 28800  # 8 hours
          kill $NGROK_PID
      
      - name: Upload Connection Details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ngrok-connection-${{ github.run_number }}
          path: |
            ngrok-host.txt
            ngrok-port.txt
            ngrok-user.txt
            ngrok-pass.txt
          retention-days: 30
          if-no-files-found: warn
      
      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up..."
          docker stop vps-container 2>/dev/null || true
          docker rm vps-container 2>/dev/null || true
          echo "✅ Cleanup complete"
