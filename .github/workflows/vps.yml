name: Bore.pub VPS - 30 Days (6-Hour Sessions)

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

jobs:
  bore-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours
    
    steps:
      - name: Install Required Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server sshpass curl netcat-openbsd build-essential
          echo "✅ Tools installed"
      
      - name: Create Container with SSH
        run: |
          # Remove old container if exists
          docker stop vps 2>/dev/null || true
          docker rm vps 2>/dev/null || true
          
          # Create fresh container
          docker run -d --name vps \
            -p 2222:22 \
            ubuntu:22.04 \
            bash -c "
              apt-get update && 
              apt-get install -y openssh-server && 
              echo 'root:12345678' | chpasswd && 
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && 
              sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && 
              service ssh start && 
              tail -f /dev/null
            "
          
          echo "✅ Container created"
          echo "Waiting for SSH to start..."
          sleep 20
      
      - name: Verify Local SSH
        run: |
          echo "Testing local SSH connection..."
          for i in {1..10}; do
            if sshpass -p '12345678' ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=5 \
              -p 2222 \
              root@localhost "echo 'SSH_READY'" 2>/dev/null; then
              echo "✅ Local SSH is working on port 2222"
              exit 0
            fi
            echo "Attempt $i/10: Waiting for SSH..."
            sleep 5
          done
          echo "❌ SSH failed to start"
          exit 1
      
      - name: Install Rust and bore-cli
        run: |
          # Install Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          
          # Install bore-cli
          ~/.cargo/bin/cargo install bore-cli
          echo "✅ bore-cli installed"
      
      - name: Start bore.pub Tunnel
        id: bore
        run: |
          source ~/.cargo/env
          
          # Kill any existing bore processes
          pkill bore 2>/dev/null || true
          
          # Start bore tunnel in background
          echo "Starting bore.pub tunnel..."
          ~/.cargo/bin/bore local 2222 --to bore.pub > bore.log 2>&1 &
          BORE_PID=$!
          
          # Wait for tunnel to establish
          echo "Waiting for tunnel..."
          sleep 15
          
          # Extract port from logs
          BORE_PORT=$(grep -o 'listening at .*:[0-9]*' bore.log | grep -o '[0-9]*$' | head -1)
          
          if [ -z "$BORE_PORT" ]; then
            BORE_PORT=$(grep -o ':[0-9]*' bore.log | grep -o '[0-9]*' | tail -1)
          fi
          
          if [ -z "$BORE_PORT" ]; then
            # Fallback - show logs
            echo "⚠️ Could not extract port automatically"
            cat bore.log
            BORE_PORT="UNKNOWN"
          fi
          
          echo ""
          echo "██████████████████████████████████████████████████████████████"
          echo "██                                                          ██"
          echo "██           ✅ BORE.PUB VPS IS READY                       ██"
          echo "██                                                          ██"
          echo "██████████████████████████████████████████████████████████████"
          echo ""
          echo "📱 TERMIUS / SSH CONNECTION DETAILS:"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "   🌐 Hostname: bore.pub"
          echo "   🔢 Port:     $BORE_PORT"
          echo "   👤 Username: root"
          echo "   🔑 Password: 12345678"
          echo ""
          echo "   📋 COPY THESE EXACT VALUES:"
          echo "   ---------------------------------------"
          echo "   Host: bore.pub"
          echo "   Port: $BORE_PORT"
          echo "   User: root"
          echo "   Pass: 12345678"
          echo "   ---------------------------------------"
          echo ""
          echo "🔗 SSH COMMAND:"
          echo "   ssh root@bore.pub -p $BORE_PORT"
          echo ""
          echo "🔍 TEST CONNECTION:"
          echo "   sshpass -p '12345678' ssh -o StrictHostKeyChecking=no root@bore.pub -p $BORE_PORT 'echo ✅ Connected'"
          echo ""
          echo "🖥️  LOCAL ACCESS (for debugging):"
          echo "   ssh root@localhost -p 2222"
          echo ""
          echo "⏱️  SESSION DETAILS:"
          echo "   • Started: $(date)"
          echo "   • Ends:    $(date -d '+6 hours')"
          echo "   • Duration: 6 hours"
          echo "   • Next session in 6 hours"
          echo "   • 30-day total: 120 sessions"
          echo ""
          
          # Save connection details
          echo "$BORE_PORT" > bore-port.txt
          echo "bore.pub" > bore-host.txt
          echo "root" > bore-user.txt
          echo "12345678" > bore-pass.txt
          
          # Test the tunnel
          echo "🔍 Testing tunnel connection..."
          sleep 5
          if sshpass -p '12345678' ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $BORE_PORT \
            root@bore.pub "echo '✅ Tunnel is working!'" 2>/dev/null; then
            echo "✅ Tunnel test successful!"
          else
            echo "⚠️ Tunnel test failed - but tunnel may still work"
            echo "   Try connecting manually with: ssh root@bore.pub -p $BORE_PORT"
          fi
          
          # Keep tunnel alive for 6 hours
          echo ""
          echo "⏳ Tunnel running for 6 hours..."
          echo "   Press Ctrl+C to stop early (will auto-restart in 6 hours)"
          
          sleep 21600  # 6 hours
          kill $BORE_PID 2>/dev/null || true
          echo "✅ Session completed. Next run in 6 hours."
      
      - name: Upload Connection Details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bore-connection-${{ github.run_number }}
          path: |
            bore-port.txt
            bore-host.txt
            bore-user.txt
            bore-pass.txt
          retention-days: 30
      
      - name: Cleanup
        if: always()
        run: |
          docker stop vps 2>/dev/null || true
          docker rm vps 2>/dev/null || true
          echo "✅ Cleanup complete"
