name: RunC VPS - 30 Days

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  runc-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install RunC
        run: |
          sudo apt-get update
          sudo apt-get install -y runc
      
      - name: Create RunC Container
        run: |
          mkdir -p rootfs
          docker export $(docker create ubuntu:22.04) | tar -C rootfs -xvf -
          
          cat > config.json << 'EOF'
          {
            "ociVersion": "1.0.0",
            "process": {
              "terminal": true,
              "user": {"uid": 0, "gid": 0},
              "args": ["/bin/bash", "-c", "service ssh start && sleep infinity"],
              "env": ["PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"]
            },
            "root": {
              "path": "rootfs",
              "readonly": false
            },
            "hostname": "vps",
            "linux": {
              "namespaces": [
                {"type": "pid"},
                {"type": "network"},
                {"type": "ipc"},
                {"type": "uts"},
                {"type": "mount"}
              ]
            }
          }
          EOF
          
          sudo runc run vps
