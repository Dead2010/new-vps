name: Web Terminal with External Access

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  web-terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Create Container (Optional - for full VPS)
        run: |
          docker run -d --name vps \
            -p 2222:22 \
            ubuntu:22.04 \
            bash -c "
              apt-get update && 
              apt-get install -y openssh-server && 
              echo 'root:12345678' | chpasswd && 
              service ssh start && 
              tail -f /dev/null
            " || true
          sleep 5
      
      - name: Install Gotty (Web Terminal)
        run: |
          wget -q https://github.com/yudai/gotty/releases/download/v1.0.1/gotty_linux_amd64.tar.gz
          tar -xzf gotty_linux_amd64.tar.gz
          chmod +x gotty
          sudo mv gotty /usr/local/bin/
      
      - name: Start Gotty Web Terminal
        run: |
          # Start gotty with root access
          gotty -w -p 8080 -c "root:12345678" bash &
          GOTTY_PID=$!
          sleep 5
          
          echo ""
          echo "██████████████████████████████████████████████████████████████"
          echo "██                                                          ██"
          echo "██           ✅ LOCAL WEB TERMINAL READY                    ██"
          echo "██                                                          ██"
          echo "██████████████████████████████████████████████████████████████"
          echo ""
          echo "🌐 LOCAL URL (on runner only):"
          echo "   http://localhost:8080"
          echo ""
          echo "📝 Login: root / 12345678"
          echo ""
      
      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          echo "✅ Cloudflared installed"
      
      - name: Create External Tunnel
        run: |
          # Create tunnel to gotty web interface
          cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          sleep 15
          
          # Get the public URL
          TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' tunnel.log | head -1)
          
          echo ""
          echo "██████████████████████████████████████████████████████████████"
          echo "██                                                          ██"
          echo "██      ✅ EXTERNAL ACCESS READY - USE THIS URL             ██"
          echo "██                                                          ██"
          echo "██████████████████████████████████████████████████████████████"
          echo ""
          echo "🌐 OPEN THIS URL IN YOUR BROWSER FROM ANYWHERE:"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "   🔗 $TUNNEL_URL"
          echo ""
          echo "📝 LOGIN CREDENTIALS:"
          echo "   Username: root"
          echo "   Password: 12345678"
          echo ""
          echo "📱 ON YOUR PHONE:"
          echo "   Just open the URL in Chrome/Safari"
          echo ""
          echo "💻 ON YOUR COMPUTER:"
          echo "   Open the URL in any browser"
          echo ""
          echo "⏱️  Session active for 6 hours"
          echo "   Started: $(date)"
          echo "   Ends:    $(date -d '+6 hours')"
          echo ""
          
          # Save URL to file
          echo "$TUNNEL_URL" > web-url.txt
          echo "root" > username.txt
          echo "12345678" > password.txt
          
          # Keep alive
          sleep 21600
          kill $TUNNEL_PID
          kill $GOTTY_PID
      
      - name: Upload Connection Details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-terminal-${{ github.run_number }}
          path: |
            web-url.txt
            username.txt
            password.txt
          retention-days: 30
