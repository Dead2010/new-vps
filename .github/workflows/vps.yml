name: VPS 30-Day Connection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd traceroute
      
      - name: Set VPS Details
        run: |
          # !!! REPLACE WITH YOUR ACTUAL VPS IP !!!
          VPS_IP="YOUR_REAL_VPS_IP_HERE"
          VPS_PORT="22"
          VPS_USER="root"
          VPS_PASS="root"
          
          echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          echo "VPS_PORT=$VPS_PORT" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "VPS_PASS=$VPS_PASS" >> $GITHUB_ENV
          
          echo "================================="
          echo "✅ VPS CONNECTION DETAILS"
          echo "================================="
          echo "📌 IP Address: $VPS_IP"
          echo "🔌 SSH Port:   $VPS_PORT"
          echo "👤 Username:   $VPS_USER"
          echo "================================="
      
      - name: Test Basic Connectivity
        run: |
          echo "🔍 Testing connection to $VPS_IP..."
          echo ""
          
          # Test 1: Ping test
          echo "📡 Test 1: Ping Test"
          if ping -c 2 -W 3 $VPS_IP > /dev/null 2>&1; then
            echo "   ✅ VPS is reachable (ping)"
          else
            echo "   ⚠️  VPS not responding to ping (firewall may block ICMP)"
          fi
          echo ""
          
          # Test 2: Port test
          echo "📡 Test 2: Port $VPS_PORT Test"
          if nc -zv -w 5 $VPS_IP $VPS_PORT 2>&1 | grep -q "succeeded"; then
            echo "   ✅ Port $VPS_PORT is open"
            echo "PORT_OPEN=true" >> $GITHUB_ENV
          else
            echo "   ❌ Port $VPS_PORT is not accessible"
            echo "PORT_OPEN=false" >> $GITHUB_ENV
            echo ""
            echo "   Possible reasons:"
            echo "   • VPS is turned off"
            echo "   • SSH service not running"
            echo "   • Firewall blocking port 22"
            echo "   • Wrong IP address"
            echo ""
            echo "   Check your VPS provider dashboard to:"
            echo "   • Verify the correct IP"
            echo "   • Ensure VPS is running"
            echo "   • Check firewall settings"
          fi
      
      - name: Try SSH Connection
        if: env.PORT_OPEN == 'true'
        run: |
          echo "🚀 Attempting SSH connection..."
          echo ""
          
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $VPS_PORT \
            $VPS_USER@$VPS_IP "
            echo '✅ SUCCESSFULLY CONNECTED'
            echo ''
            echo '📋 SYSTEM INFORMATION:'
            echo '  Hostname: ' \$(hostname)
            echo '  Uptime: ' \$(uptime -p)
            echo '  Memory:'
            free -h
            echo '  Disk:'
            df -h
          " || echo "❌ SSH authentication failed - Check username/password"
      
      - name: Connection Failed - Help
        if: env.PORT_OPEN != 'true'
        run: |
          echo ""
          echo "============================================="
          echo "❌ CONNECTION FAILED - TROUBLESHOOTING"
          echo "============================================="
          echo ""
          echo "Your VPS at $VPS_IP is not responding on port $VPS_PORT."
          echo ""
          echo "🔍 CHECK THESE:"
          echo ""
          echo "1️⃣  **IP ADDRESS VERIFICATION**"
          echo "   • Log into your VPS provider dashboard"
          echo "   • Find the correct public IPv4 address"
          echo "   • It should look like: 123.456.78.90"
          echo "   • Current IP in use: $VPS_IP"
          echo ""
          echo "2️⃣  **VPS STATUS**"
          echo "   • Make sure your VPS is RUNNING"
          echo "   • Start it if it's stopped"
          echo ""
          echo "3️⃣  **SSH SERVICE**"
          echo "   • SSH should be installed and running"
          echo "   • Default port is 22"
          echo ""
          echo "4️⃣  **FIREWALL**"
          echo "   • Port 22 must be open"
          echo "   • Check: ufw status (if using UFW)"
          echo "   • Check: iptables -L (if using iptables)"
          echo ""
          echo "📝 NEXT STEPS:"
          echo "   • Verify your IP in provider dashboard"
          echo "   • Update this workflow with correct IP"
          echo "   • Ensure VPS is running"
          echo "============================================="
      
      - name: Save Log
        if: always()
        run: |
          mkdir -p logs
          echo "Run: ${{ github.run_number }}" > logs/status.txt
          echo "Date: $(date)" >> logs/status.txt
          echo "VPS: $VPS_IP:$VPS_PORT" >> logs/status.txt
          echo "Port Open: ${PORT_OPEN:-false}" >> logs/status.txt
          echo "Status: ${{ job.status }}" >> logs/status.txt
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
