name: SSH for Termius - Serveo.net

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  serveo-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          echo "root:12345678" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
      
      - name: Create Serveo Tunnel
        run: |
          echo ""
          echo "========================================="
          echo "🚀 CREATING SERVERO TUNNEL"
          echo "========================================="
          echo ""
          
          # Create SSH tunnel to serveo.net
          ssh -o StrictHostKeyChecking=no -R 80:localhost:22 serveo.net &
          TUNNEL_PID=$!
          sleep 5
          
          echo ""
          echo "✅ TUNNEL CREATED!"
          echo ""
          echo "📱 TERMIUS CONNECTION DETAILS:"
          echo "══════════════════════════════════"
          echo ""
          echo "   Hostname: serveo.net"
          echo "   Port:     22"
          echo "   Username: root"
          echo "   Password: 12345678"
          echo ""
          echo "   Alternative port: 2222"
          echo ""
          echo "⏱️  Tunnel active for 10 minutes"
          echo ""
          
          sleep 600
          kill $TUNNEL_PID 2>/dev/null || true
