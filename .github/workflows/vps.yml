name: VPS Deployment

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-to-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}
      
      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} -p ${{ secrets.VPS_PORT }} "echo 'SSH connection successful'"
      
      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} -p ${{ secrets.VPS_PORT }} << 'EOF'
            # Create workspace if not exists
            mkdir -p /opt/vps-app
            cd /opt/vps-app
            
            # Copy files from GitHub
            echo "Downloading files from GitHub..."
            
            # Download files using curl
            curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                 -L https://api.github.com/repos/${{ github.repository }}/tarball/main \
                 -o repo.tar.gz
            
            # Extract
            tar -xzf repo.tar.gz --strip-components=1
            rm repo.tar.gz
            
            # Create necessary directories
            mkdir -p uploads logs backup
            
            # Create .env file if not exists
            if [ ! -f .env ]; then
              cat > .env << ENVEOF
      DB_NAME=myapp
      DB_USER=appuser
      DB_PASSWORD=SecurePassword123!
      MYSQL_ROOT_PASSWORD=RootSecurePassword456!
      REDIS_PASSWORD=RedisSecure321!
      GRAFANA_PASSWORD=admin
      PGADMIN_PASSWORD=PgAdminSecure654!
      ENVEOF
            fi
            
            # Pull latest images
            docker-compose pull
            
            # Stop and remove old containers
            docker-compose down
            
            # Start new containers
            docker-compose up -d --build
            
            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 20
            
            # Check status
            docker-compose ps
            
            # Clean up old images
            docker system prune -f
            
            # Show access information
            IP=$(curl -s ifconfig.me)
            echo "========================================="
            echo "✅ DEPLOYMENT COMPLETE!"
            echo "========================================="
            echo "📡 Server IP: $IP"
            echo ""
            echo "🌐 Web Services:"
            echo "   • Web App: http://$IP"
            echo "   • Portainer: http://$IP:9000"
            echo "   • phpMyAdmin: http://$IP:8080"
            echo "   • Grafana: http://$IP:3000"
            echo "   • Uptime Kuma: http://$IP:3001"
            echo ""
            echo "📊 Service Status:"
            docker-compose ps --services
            echo "========================================="
          EOF
      
      - name: Health Check
        run: |
          sleep 30
          echo "Checking service health..."
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} -p ${{ secrets.VPS_PORT }} "curl -s http://localhost/health || echo 'Health check failed'"
          echo "✅ Deployment verification complete"
