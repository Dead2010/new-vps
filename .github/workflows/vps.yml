name: VPS 30-Day Connection with Auto IP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd curl
          sudo systemctl start ssh || sudo service ssh start
          echo "✅ SSH tools installed"
      
      - name: Get VPS Public IP
        id: get_ip
        run: |
          echo "========================================="
          echo "🌐 DETECTING VPS PUBLIC IP"
          echo "========================================="
          echo ""
          
          # Try multiple services to get public IP
          echo "📡 Attempting to detect public IP..."
          
          IP1=$(curl -s --max-time 5 ifconfig.me 2>/dev/null || echo "")
          IP2=$(curl -s --max-time 5 icanhazip.com 2>/dev/null || echo "")
          IP3=$(curl -s --max-time 5 ipinfo.io/ip 2>/dev/null || echo "")
          IP4=$(curl -s --max-time 5 api.ipify.org 2>/dev/null || echo "")
          
          # Use the first successful IP
          for IP in "$IP1" "$IP2" "$IP3" "$IP4"; do
            if [[ -n "$IP" && "$IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              VPS_IP="$IP"
              break
            fi
          done
          
          if [[ -n "$VPS_IP" ]]; then
            echo "✅ Public IP detected: $VPS_IP"
            echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          else
            echo "❌ Could not detect public IP"
            echo "Using localhost as fallback"
            echo "VPS_IP=127.0.0.1" >> $GITHUB_ENV
          fi
          
          echo ""
          echo "📝 Detected IP: $VPS_IP"
          echo "========================================="
      
      - name: Show Detected IP
        run: |
          echo "========================================="
          echo "           📍 YOUR VPS IP"
          echo "========================================="
          echo ""
          echo "   ██╗   ██╗██████╗ ███████╗"
          echo "   ██║   ██║██╔══██╗██╔════╝"
          echo "   ██║   ██║██████╔╝███████╗"
          echo "   ╚██╗ ██╔╝██╔═══╝ ╚════██║"
          echo "    ╚████╔╝ ██║     ███████║"
          echo "     ╚═══╝  ╚═╝     ╚══════╝"
          echo ""
          echo "   ➜ DETECTED IP: $VPS_IP"
          echo "   ➜ PORT: 22"
          echo "   ➜ USER: root"
          echo ""
          echo "   🔗 Connection String:"
          echo "   ssh root@$VPS_IP -p 22"
          echo ""
          echo "========================================="
      
      - name: Set VPS Connection Details
        run: |
          VPS_PORT="22"
          VPS_USER="root"
          VPS_PASS="root"
          
          echo "VPS_PORT=$VPS_PORT" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "VPS_PASS=$VPS_PASS" >> $GITHUB_ENV
          
          echo "========================================="
          echo "     🔌 SSH CONNECTION DETAILS"
          echo "========================================="
          echo ""
          echo "   🌐 VPS IP ADDRESS:    $VPS_IP"
          echo "   🔢 SSH PORT:          $VPS_PORT"
          echo "   👤 SSH USERNAME:      $VPS_USER"
          echo "   🔑 SSH PASSWORD:      [HIDDEN]"
          echo ""
          echo "   📝 Full SSH Command:"
          echo "   ssh $VPS_USER@$VPS_IP -p $VPS_PORT"
          echo ""
          echo "========================================="
      
      - name: Test Connection to VPS
        run: |
          echo "🔍 Testing connection to $VPS_IP on port $VPS_PORT..."
          
          echo "📡 Test 1: Ping Test"
          if ping -c 2 -W 3 $VPS_IP > /dev/null 2>&1; then
            echo "   ✅ $VPS_IP is reachable"
          else
            echo "   ⚠️  $VPS_IP not responding to ping (firewall may block ICMP)"
          fi
          echo ""
          
          echo "📡 Test 2: Port $VPS_PORT Test"
          if nc -zv -w 5 $VPS_IP $VPS_PORT 2>&1 | grep -q "succeeded"; then
            echo "   ✅ Port $VPS_PORT is open on $VPS_IP"
            echo "PORT_OPEN=true" >> $GITHUB_ENV
          else
            echo "   ❌ Port $VPS_PORT is not accessible on $VPS_IP"
            echo "PORT_OPEN=false" >> $GITHUB_ENV
            echo ""
            echo "   Possible reasons:"
            echo "   • VPS is turned off"
            echo "   • SSH service not running"
            echo "   • Firewall blocking port 22"
            echo "   • Wrong IP address"
          fi
      
      - name: Connect to VPS
        if: env.PORT_OPEN == 'true'
        run: |
          echo "========================================="
          echo "🚀 CONNECTING TO $VPS_IP:$VPS_PORT"
          echo "========================================="
          echo ""
          
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $VPS_PORT \
            $VPS_USER@$VPS_IP "
            echo '✅ SUCCESSFULLY CONNECTED TO $VPS_IP'
            echo '========================================='
            echo ''
            echo '📋 SYSTEM INFORMATION:'
            echo '  Hostname: ' \$(hostname)
            echo '  OS: ' \$(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')
            echo '  Kernel: ' \$(uname -r)
            echo '  Uptime: ' \$(uptime -p)
            echo '  Load: ' \$(uptime | awk -F'load average:' '{print $2}')
            echo ''
            echo '💾 MEMORY USAGE:'
            free -h
            echo ''
            echo '💽 DISK USAGE:'
            df -h
            echo ''
            echo '🌐 NETWORK INTERFACES:'
            ip addr show | grep inet | grep -v '127.0.0.1'
            echo ''
            echo '👥 LOGGED IN USERS:'
            who || echo '  No users logged in'
            echo ''
            echo '📅 CURRENT TIME:'
            date
            echo '========================================='
          " || echo "❌ Connection to $VPS_IP failed"
      
      - name: Connection Failed - Local Fallback
        if: env.PORT_OPEN != 'true'
        run: |
          echo "========================================="
          echo "⚠️  CONNECTION TO VPS FAILED"
          echo "========================================="
          echo ""
          echo "Could not connect to $VPS_IP on port $VPS_PORT"
          echo ""
          echo "🔍 Troubleshooting:"
          echo "  1. Verify this is your correct VPS IP"
          echo "  2. Make sure your VPS is running"
          echo "  3. Check that SSH service is enabled"
          echo "  4. Ensure firewall allows port 22"
          echo ""
          echo "📝 Your detected IP: $VPS_IP"
          echo ""
          echo "🔄 Trying localhost connection as fallback..."
          echo ""
          
          # Try localhost as fallback
          sshpass -p "root" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=5 \
            -p 22 \
            root@127.0.0.1 "echo '✅ Connected to localhost fallback'" || echo "❌ Localhost connection also failed"
      
      - name: Display Connection Summary
        if: always()
        run: |
          echo ""
          echo "══════════════════════════════════════════════"
          echo "           CONNECTION SUMMARY"
          echo "══════════════════════════════════════════════"
          echo ""
          echo "   🌐 Detected VPS IP:  $VPS_IP"
          echo "   🔢 SSH Port:         $VPS_PORT"
          echo "   👤 SSH User:         $VPS_USER"
          echo "   📊 Connection Status: ${{ env.PORT_OPEN == 'true' && 'SUCCESS' || 'FAILED' }}"
          echo ""
          echo "   🔗 Connection String:"
          echo "   ssh $VPS_USER@$VPS_IP -p $VPS_PORT"
          echo ""
          echo "   📁 Logs saved to artifact: vps-logs-run-${{ github.run_number }}"
          echo ""
          echo "   💡 To test manually:"
          echo "   curl ifconfig.me  # Get your IP"
          echo "   ssh root@$(curl -s ifconfig.me) -p 22"
          echo ""
          echo "══════════════════════════════════════════════"
      
      - name: Save Log
        if: always()
        run: |
          mkdir -p logs
          echo "=========================================" > logs/connection.log
          echo "VPS CONNECTION LOG - RUN #${{ github.run_number }}" >> logs/connection.log
          echo "=========================================" >> logs/connection.log
          echo "Date: $(date)" >> logs/connection.log
          echo "Detected VPS IP: $VPS_IP" >> logs/connection.log
          echo "SSH Port: $VPS_PORT" >> logs/connection.log
          echo "SSH User: $VPS_USER" >> logs/connection.log
          echo "Port Open: ${PORT_OPEN:-false}" >> logs/connection.log
          echo "Status: ${{ job.status }}" >> logs/connection.log
          echo "=========================================" >> logs/connection.log
          
          echo "$VPS_IP" > logs/vps-ip.txt
          echo "ssh $VPS_USER@$VPS_IP -p $VPS_PORT" > logs/connection-command.txt
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
      
      - name: Next Run Info
        run: |
          echo ""
          echo "========================================="
          echo "✅ WORKFLOW COMPLETE"
          echo "========================================="
          echo "📅 Completed at: $(date)"
          echo "⏰ Next run in: 6 hours"
          echo "📆 30-day schedule: Active"
          echo "🔢 Run #: ${{ github.run_number }}"
          echo "🌐 Your VPS IP: $VPS_IP"
          echo "========================================="
