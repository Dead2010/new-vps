name: VPS 30-Day Connection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
      
      - name: Set VPS Details
        run: |
          # !!! YOUR REAL VPS IP GOES HERE !!!
          VPS_IP="203.0.113.45"  # <-- CHANGE THIS TO YOUR IP
          VPS_PORT="22"
          VPS_USER="root"
          VPS_PASS="root"
          
          echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          echo "VPS_PORT=$VPS_PORT" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "VPS_PASS=$VPS_PASS" >> $GITHUB_ENV
          
          echo "================================="
          echo "✅ VPS CONNECTION DETAILS"
          echo "================================="
          echo "📌 IP Address: $VPS_IP"
          echo "🔌 SSH Port:   $VPS_PORT"
          echo "👤 Username:   $VPS_USER"
          echo "================================="
      
      - name: Test Connection
        run: |
          echo "Testing connection to $VPS_IP on port $VPS_PORT..."
          nc -zv -w 5 $VPS_IP $VPS_PORT || exit 1
      
      - name: Connect to VPS
        run: |
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -p $VPS_PORT \
            $VPS_USER@$VPS_IP "uptime && free -h && df -h"
