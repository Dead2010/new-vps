name: VPS Connection with Custom SSH Port

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      ssh_ip:
        description: 'VPS IP Address'
        required: false
        type: string
      ssh_port:
        description: 'SSH Port (default: 22)'
        required: false
        default: '22'
        type: string
      ssh_user:
        description: 'SSH Username (default: root)'
        required: false
        default: 'root'
        type: string
      ssh_pass:
        description: 'SSH Password (default: root)'
        required: false
        default: 'root'
        type: string

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd curl nmap
          echo "✅ SSH tools installed"
      
      - name: Configure Connection
        id: config
        run: |
          echo "========================================="
          echo "🔧 SSH CONNECTION CONFIGURATION"
          echo "========================================="
          echo ""
          
          # Get IP (manual or auto-detected)
          if [[ -n "${{ github.event.inputs.ssh_ip }}" ]]; then
            SSH_IP="${{ github.event.inputs.ssh_ip }}"
            echo "📌 Using manual IP: $SSH_IP"
          else
            echo "📡 Auto-detecting public IP..."
            SSH_IP=$(curl -s --max-time 5 ifconfig.me 2>/dev/null || echo "")
            if [[ -n "$SSH_IP" && "$SSH_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "📌 Auto-detected IP: $SSH_IP"
            else
              echo "⚠️  Could not detect IP, using localhost"
              SSH_IP="127.0.0.1"
            fi
          fi
          
          # Get port
          SSH_PORT="${{ github.event.inputs.ssh_port }}"
          
          # Get credentials
          SSH_USER="${{ github.event.inputs.ssh_user }}"
          SSH_PASS="${{ github.event.inputs.ssh_pass }}"
          
          # Save to env
          echo "SSH_IP=$SSH_IP" >> $GITHUB_ENV
          echo "SSH_PORT=$SSH_PORT" >> $GITHUB_ENV
          echo "SSH_USER=$SSH_USER" >> $GITHUB_ENV
          echo "SSH_PASS=$SSH_PASS" >> $GITHUB_ENV
          
          echo ""
          echo "📋 Connection Details:"
          echo "   • IP Address: $SSH_IP"
          echo "   • SSH Port:   $SSH_PORT"
          echo "   • Username:   $SSH_USER"
          echo "   • Password:   [HIDDEN]"
          echo ""
          echo "🔗 Connection Command:"
          echo "   ssh $SSH_USER@$SSH_IP -p $SSH_PORT"
          echo ""
          echo "========================================="
      
      - name: Test SSH Port
        run: |
          echo "========================================="
          echo "🔍 TESTING SSH PORT $SSH_PORT ON $SSH_IP"
          echo "========================================="
          echo ""
          
          # Test 1: Basic port check
          echo "📡 Test 1: Basic Port Check"
          if nc -zv -w 5 $SSH_IP $SSH_PORT 2>&1 | grep -q "succeeded"; then
            echo "   ✅ Port $SSH_PORT is OPEN"
            echo "PORT_OPEN=true" >> $GITHUB_ENV
          else
            echo "   ❌ Port $SSH_PORT is CLOSED or FILTERED"
            echo "PORT_OPEN=false" >> $GITHUB_ENV
          fi
          echo ""
          
          # Test 2: Advanced port scan (if basic fails)
          if [[ "$PORT_OPEN" == "false" ]]; then
            echo "📡 Test 2: Quick Port Scan (common SSH ports)"
            for port in 22 2222 22222 222 2022 8022; do
              if nc -zv -w 2 $SSH_IP $port 2>&1 | grep -q "succeeded"; then
                echo "   ✅ Found open port: $port"
                echo "SUGGESTED_PORT=$port" >> $GITHUB_ENV
                break
              fi
            done
            echo ""
          fi
          
          # Test 3: Ping test
          echo "📡 Test 3: Ping Test"
          if ping -c 2 -W 3 $SSH_IP > /dev/null 2>&1; then
            echo "   ✅ Server is reachable (ping)"
          else
            echo "   ⚠️  Server not responding to ping (firewall may block ICMP)"
          fi
      
      - name: SSH Connection Attempt
        if: env.PORT_OPEN == 'true'
        run: |
          echo "========================================="
          echo "🚀 ATTEMPTING SSH CONNECTION"
          echo "========================================="
          echo "Connecting to $SSH_USER@$SSH_IP:$SSH_PORT"
          echo ""
          
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $SSH_PORT \
            $SSH_USER@$SSH_IP "
            echo '✅ SUCCESSFULLY CONNECTED'
            echo '========================================='
            echo 'Hostname: ' \$(hostname)
            echo 'Date: ' \$(date)
            echo 'Uptime: ' \$(uptime -p)
            echo ''
            echo '📊 System Info:'
            echo '  OS: ' \$(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')
            echo '  Kernel: ' \$(uname -r)
            echo ''
            echo '💾 Memory:'
            free -h
            echo ''
            echo '💽 Disk:'
            df -h
            echo '========================================='
          " || echo "❌ SSH connection failed - Check credentials"
      
      - name: Port Discovery Mode
        if: env.PORT_OPEN != 'true'
        run: |
          echo "========================================="
          echo "🔎 PORT DISCOVERY MODE"
          echo "========================================="
          echo ""
          echo "Port $SSH_PORT is not accessible on $SSH_IP"
          echo ""
          echo "🔧 Try these common SSH ports manually:"
          echo ""
          echo "   ssh $SSH_USER@$SSH_IP -p 22     (default)"
          echo "   ssh $SSH_USER@$SSH_IP -p 2222   (alternative)"
          echo "   ssh $SSH_USER@$SSH_IP -p 22222  (alternative)"
          echo "   ssh $SSH_USER@$SSH_IP -p 2022   (alternative)"
          echo "   ssh $SSH_USER@$SSH_IP -p 8022   (alternative)"
          echo ""
          echo "📝 To try a different port, run this workflow manually"
          echo "   and enter the port number in 'ssh_port' field"
          echo ""
          echo "💡 If you don't know your SSH port:"
          echo "   • Check your VPS provider dashboard"
          echo "   • Look for 'SSH port' in welcome email"
          echo "   • Default is usually 22"
          echo ""
          echo "========================================="
      
      - name: Save Connection Log
        if: always()
        run: |
          mkdir -p logs
          cat > logs/connection.txt << EOF
=========================================
VPS CONNECTION LOG - RUN #${{ github.run_number }}
=========================================
Date: $(date)
IP: $SSH_IP
Port: $SSH_PORT
User: $SSH_USER
Status: ${{ job.status }}
Port Open: ${PORT_OPEN:-false}

Connection Command:
ssh $SSH_USER@$SSH_IP -p $SSH_PORT
=========================================
EOF
          
          # Save IP to separate file
          echo "$SSH_IP" > logs/vps-ip.txt
          echo "$SSH_PORT" > logs/ssh-port.txt
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
      
      - name: Summary
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "          WORKFLOW SUMMARY"
          echo "════════════════════════════════════════"
          echo ""
          echo "   🌐 IP: $SSH_IP"
          echo "   🔢 Port: $SSH_PORT"
          echo "   👤 User: $SSH_USER"
          echo "   📊 Status: ${{ job.status }}"
          echo ""
          echo "   🔗 ssh $SSH_USER@$SSH_IP -p $SSH_PORT"
          echo ""
          echo "   ⏰ Next run in 6 hours"
          echo "   📅 30-day schedule active"
          echo "════════════════════════════════════════"
