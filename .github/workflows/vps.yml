name: Docker VPS Diagnostic & Fix

on:
  workflow_dispatch:

jobs:
  fix-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass curl netcat-openbsd
          echo "✅ Tools installed"
      
      - name: Check Docker Container
        run: |
          echo "========================================="
          echo "🔍 CHECKING DOCKER CONTAINER"
          echo "========================================="
          docker ps -a
          echo ""
          
          # Check if container exists
          if docker ps | grep -q vps-container; then
            echo "✅ Container is running"
            docker exec vps-container ps aux | grep ssh
          else
            echo "❌ Container not running - restarting..."
            docker run -d --name vps-container \
              -p 2222:22 \
              -p 8080:80 \
              -p 8443:443 \
              -p 8888:8080 \
              -p 54321:54321 \
              ubuntu:22.04 \
              bash -c "
                apt-get update && 
                apt-get install -y openssh-server && 
                echo 'root:12345678' | chpasswd && 
                sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && 
                sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && 
                service ssh start && 
                tail -f /dev/null
              "
            echo "✅ Container restarted"
            sleep 10
          fi
      
      - name: Fix SSH Configuration
        run: |
          echo "========================================="
          echo "🔧 FIXING SSH CONFIGURATION"
          echo "========================================="
          
          # Ensure SSH is properly configured
          docker exec vps-container bash -c "
            echo '========= SSH STATUS ========='
            service ssh status
            
            echo '========= FIXING SSH ========='
            # Reconfigure SSH
            sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
            sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
            echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config
            echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config
            
            # Restart SSH
            service ssh restart
            sleep 5
            service ssh status
            
            echo '========= SSH LISTENING PORTS ========='
            apt-get update && apt-get install -y net-tools
            netstat -tlnp | grep ssh || ss -tlnp | grep ssh
          "
      
      - name: Test Local SSH Connection
        run: |
          echo "========================================="
          echo "🔍 TESTING LOCAL SSH CONNECTION"
          echo "========================================="
          
          # Test connection to container via localhost:2222
          echo "Testing localhost:2222..."
          if nc -zv localhost 2222 2>&1 | grep -q succeeded; then
            echo "✅ Port 2222 is open locally"
            
            # Try SSH connection
            sshpass -p '12345678' ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=5 \
              -p 2222 \
              root@localhost "echo '✅ Local SSH working!'" && \
              echo "✅ Local SSH successful" || \
              echo "❌ Local SSH failed - Check password"
          else
            echo "❌ Port 2222 not open locally"
            echo "Check if container is running: docker ps"
          fi
      
      - name: Restart Cloudflare Tunnel
        run: |
          echo "========================================="
          echo "🚀 RESTARTING CLOUDFLARE TUNNEL"
          echo "========================================="
          
          # Kill any existing tunnels
          pkill cloudflared 2>/dev/null || true
          
          # Download fresh cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          
          # Start new tunnel
          cloudflared tunnel --url ssh://localhost:2222 > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          sleep 15
          
          # Get URL
          TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' tunnel.log | head -1)
          HOSTNAME=$(echo $TUNNEL_URL | sed 's|https://||')
          
          echo ""
          echo "██████████████████████████████████████████████████████████████"
          echo "██                                                          ██"
          echo "██           ✅ NEW TUNNEL CREATED                          ██"
          echo "██                                                          ██"
          echo "██████████████████████████████████████████████████████████████"
          echo ""
          echo "📱 NEW TERMIUS CONNECTION DETAILS:"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "   🌐 Hostname: $HOSTNAME"
          echo "   🔢 Port:     22"
          echo "   👤 Username: root"
          echo "   🔑 Password: 12345678"
          echo ""
          echo "   📋 COPY THESE EXACT VALUES INTO TERMIUS"
          echo ""
          echo "🔗 Direct SSH Command:"
          echo "   ssh root@$HOSTNAME -p 22"
          echo ""
          echo "🖥️  Local Access (for testing):"
          echo "   ssh root@localhost -p 2222"
          echo ""
          echo "⏱️  This tunnel is active NOW for 5 minutes"
          echo ""
          
          # Save to file
          echo "$HOSTNAME" > new-hostname.txt
          
          # Keep alive for testing
          sleep 300  # 5 minutes for testing
          kill $TUNNEL_PID
      
      - name: Upload New Connection Details
        uses: actions/upload-artifact@v4
        with:
          name: fixed-connection
          path: new-hostname.txt
