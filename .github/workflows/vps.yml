name: VPS Connection with SSHX

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      vps_ip:
        description: 'Enter your VPS IP address'
        required: false
        default: ''
        type: string
      ssh_port:
        description: 'SSH Port'
        required: false
        default: '22'
        type: string
      force_sshx:
        description: 'Run SSHX even without VPS?'
        required: false
        default: 'false'
        type: string

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd curl
      
      - name: Configure Connection
        run: |
          # Get IP
          if [[ -n "${{ github.event.inputs.vps_ip }}" ]]; then
            SSH_IP="${{ github.event.inputs.vps_ip }}"
          else
            SSH_IP=$(curl -s --max-time 5 ifconfig.me 2>/dev/null || echo "127.0.0.1")
          fi
          
          SSH_PORT="${{ github.event.inputs.ssh_port }}"
          FORCE_SSHX="${{ github.event.inputs.force_sshx }}"
          
          echo "SSH_IP=$SSH_IP" >> $GITHUB_ENV
          echo "SSH_PORT=$SSH_PORT" >> $GITHUB_ENV
          echo "FORCE_SSHX=$FORCE_SSHX" >> $GITHUB_ENV
          
          echo "========================================="
          echo "📋 Connection: ssh root@$SSH_IP -p $SSH_PORT"
          echo "========================================="
      
      - name: Test VPS Connection
        run: |
          if nc -zv -w 5 $SSH_IP $SSH_PORT 2>&1 | grep -q "succeeded"; then
            echo "✅ Port $SSH_PORT is OPEN"
            echo "VPS_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "❌ Port $SSH_PORT is CLOSED"
            echo "VPS_AVAILABLE=false" >> $GITHUB_ENV
          fi
      
      - name: Connect to VPS (if available)
        if: env.VPS_AVAILABLE == 'true'
        run: |
          sshpass -p "root" ssh -o StrictHostKeyChecking=no \
            -p $SSH_PORT \
            root@$SSH_IP "uptime && free -h"
      
      - name: Install and Run SSHX
        if: env.VPS_AVAILABLE == 'true' || env.FORCE_SSHX == 'true'
        run: |
          echo "========================================="
          echo "🔗 STARTING SSHX SESSION"
          echo "========================================="
          echo ""
          
          curl -sSf https://sshx.io/get | sh -s run &
          SSHX_PID=$!
          sleep 10
          
          if ps -p $SSHX_PID > /dev/null 2>&1; then
            echo "✅ SSHX running (PID: $SSHX_PID)"
            echo "⏱️  Session active for 300 seconds"
            sleep 300
            kill $SSHX_PID 2>/dev/null || true
          else
            echo "❌ SSHX failed to start"
          fi
      
      - name: SSHX Info (when VPS unavailable)
        if: env.VPS_AVAILABLE == 'false' && env.FORCE_SSHX == 'false'
        run: |
          echo "========================================="
          echo "ℹ️  SSHX INFORMATION"
          echo "========================================="
          echo ""
          echo "SSHX was not started because:"
          echo "• No VPS connection available on $SSH_IP:$SSH_PORT"
          echo ""
          echo "To run SSHX anyway, use 'force_sshx: true'"
          echo "Or enter your real VPS IP manually"
          echo ""
          echo "SSHX Command: curl -sSf https://sshx.io/get | sh -s run"
          echo "========================================="
      
      - name: Save Log
        if: always()
        run: |
          mkdir -p logs
          echo "Run: ${{ github.run_number }}" > logs/status.txt
          echo "IP: $SSH_IP" >> logs/status.txt
          echo "Port: $SSH_PORT" >> logs/status.txt
          echo "VPS Available: $VPS_AVAILABLE" >> logs/status.txt
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-${{ github.run_number }}
          path: logs/
