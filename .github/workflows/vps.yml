name: Docker VPS - 30 Days

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  create-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker $USER
          docker version
      
      - name: Check Available Ports
        run: |
          echo "Checking which ports are available..."
          sudo netstat -tlnp | grep LISTEN
          echo ""
          echo "✅ Ports 2222, 8080, 8888 are free"
      
      - name: Create Ubuntu Container with SSH Pre-installed
        run: |
          # Stop and remove any existing container
          docker stop vps-container 2>/dev/null || true
          docker rm vps-container 2>/dev/null || true
          
          # Create container with SSH pre-configured
          docker run -d --name vps-container \
            -p 2222:22 \
            -p 8080:80 \
            -p 8443:443 \
            -p 8888:8080 \
            -p 54321:54321 \
            ubuntu:22.04 \
            bash -c "
              apt-get update && 
              apt-get install -y sudo wget curl net-tools && 
              echo 'root:12345678' | chpasswd && 
              apt-get install -y openssh-server && 
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && 
              sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && 
              service ssh start && 
              tail -f /dev/null
            "
          
          echo "✅ Container created successfully"
          docker ps
      
      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH to start in container..."
          sleep 20
          docker exec vps-container service ssh status || echo "SSH starting..."
          sleep 10
      
      - name: Verify SSH is working
        run: |
          docker exec vps-container netstat -tlnp | grep :22 || echo "SSH not listening yet"
          echo "Testing local SSH connection..."
          apt-get install -y sshpass || true
          sshpass -p '12345678' ssh -o StrictHostKeyChecking=no -p 2222 root@localhost "echo '✅ SSH is working!'" || echo "SSH not ready yet, but will be soon"
      
      - name: Install Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          echo "✅ Cloudflared installed"
      
      - name: Create Tunnel to Container SSH
        run: |
          # Create tunnel to the container's SSH port (2222 on host)
          cloudflared tunnel --url ssh://localhost:2222 > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          sleep 15
          
          TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' tunnel.log | head -1)
          HOSTNAME=$(echo $TUNNEL_URL | sed 's|https://||')
          
          echo ""
          echo "██████████████████████████████████████████████████████████████"
          echo "██                                                          ██"
          echo "██           ✅ YOUR VPS IS READY                           ██"
          echo "██                                                          ██"
          echo "██████████████████████████████████████████████████████████████"
          echo ""
          echo "📱 TERMIUS CONNECTION DETAILS:"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "   🌐 Hostname: $HOSTNAME"
          echo "   🔢 Port:     22"
          echo "   👤 Username: root"
          echo "   🔑 Password: 12345678"
          echo ""
          echo "   📋 COPY THESE EXACT VALUES INTO TERMIUS"
          echo ""
          echo "🔗 Direct SSH Command:"
          echo "   ssh root@$HOSTNAME -p 22"
          echo ""
          echo "🖥️  Local Access (from runner):"
          echo "   ssh root@localhost -p 2222 (password: 12345678)"
          echo ""
          echo "🌐 Web Access Ports:"
          echo "   • HTTP:  http://$HOSTNAME:8080"
          echo "   • HTTPS: https://$HOSTNAME:8443"
          echo "   • App:   http://$HOSTNAME:8888"
          echo "   • Panel: http://$HOSTNAME:54321"
          echo ""
          echo "⏱️  Session active for: 6 HOURS"
          echo "   Next session in 6 hours"
          echo "   30-day total: 120 sessions"
          echo ""
          echo "📝 TUNNEL URL: $TUNNEL_URL"
          echo ""
          
          # Save to file
          echo "$HOSTNAME" > vps-hostname.txt
          echo "root" > vps-username.txt
          echo "12345678" > vps-password.txt
          
          sleep 21600  # 6 hours
          kill $TUNNEL_PID
      
      - name: Install 3X-UI Panel (Optional)
        if: always()
        run: |
          echo "Installing 3X-UI panel in container..."
          docker exec vps-container bash -c "
            apt-get update && 
            apt-get install -y curl wget && 
            bash <(curl -Ls https://raw.githubusercontent.com/mhsanaei/3x-ui/main/install.sh) << EOF
            y
            54321
            admin
            admin123
            admin123
            $HOSTNAME
            EOF
          " || echo "3X-UI installation skipped"
      
      - name: Create Tunnel to Web Panel
        if: always()
        run: |
          # Create tunnel for web panel (port 54321)
          cloudflared tunnel --url http://localhost:54321 > web-tunnel.log 2>&1 &
          WEB_TUNNEL_PID=$!
          sleep 10
          
          WEB_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' web-tunnel.log | head -1)
          
          echo ""
          echo "🌐 Web Panel Access:"
          echo "   URL: $WEB_URL"
          echo "   Username: admin"
          echo "   Password: admin123"
          echo ""
          echo "$WEB_URL" > web-url.txt
          
          # This will run alongside the SSH tunnel
          wait $WEB_TUNNEL_PID
      
      - name: Upload Connection Details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-connection-${{ github.run_number }}
          path: |
            vps-hostname.txt
            vps-username.txt
            vps-password.txt
            web-url.txt
          retention-days: 30
      
      - name: Keep Container Alive
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "✅ SESSION COMPLETE"
          echo "========================================="
          echo "Container is still running for 6 hours"
          echo "You can access it via the tunnel URL above"
          echo ""
          echo "To check container status:"
          echo "  docker ps | grep vps-container"
          echo ""
          echo "To view logs:"
          echo "  docker logs vps-container --tail 50"
