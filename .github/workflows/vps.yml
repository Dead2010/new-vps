name: Simple Working VPS for Termius

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  simple-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
      
      - name: Create Container with Working SSH
        run: |
          docker run -d --name vps \
            -p 2222:22 \
            ubuntu:22.04 \
            bash -c "
              apt-get update && 
              apt-get install -y openssh-server && 
              echo 'root:12345678' | chpasswd && 
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && 
              service ssh start && 
              tail -f /dev/null
            "
          sleep 15
      
      - name: Test Local SSH
        run: |
          sshpass -p '12345678' ssh -o StrictHostKeyChecking=no \
            -p 2222 root@localhost "echo '✅ Local SSH OK'"
      
      - name: Get Runner IP
        id: ip
        run: |
          IP=$(curl -s ifconfig.me)
          echo "RUNNER_IP=$IP" >> $GITHUB_ENV
          echo "Runner IP: $IP"
      
      - name: Display Connection Info
        run: |
          echo ""
          echo "========================================="
          echo "    🔌 CONNECT USING THESE DETAILS"
          echo "========================================="
          echo ""
          echo "📱 FOR TERMIUS (use these exact values):"
          echo "-----------------------------------------"
          echo "   🌐 Hostname: regression-purchases-organized-cup.trycloudflare.com"
          echo "   🔢 Port:     2222"
          echo "   👤 Username: root"
          echo "   🔑 Password: 12345678"
          echo "-----------------------------------------"
          echo ""
          echo "⚠️  IMPORTANT: Use PORT 2222 not 22"
          echo ""
          echo "🔗 SSH Command:"
          echo "   ssh root@regression-purchases-organized-cup.trycloudflare.com -p 2222"
          echo ""
          echo "🖥️  Local test (if tunnel fails):"
          echo "   ssh root@localhost -p 2222"
          echo ""
          echo "⏱️  Session: 6 hours"
          echo ""
      
      - name: Keep Alive
        run: sleep 21600
