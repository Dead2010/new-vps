name: Simple Working VPS

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Create Container with SSH
        run: |
          # Create container with SSH pre-configured
          docker run -d --name vps \
            -p 2222:22 \
            ubuntu:22.04 \
            bash -c "
              apt-get update && 
              apt-get install -y openssh-server && 
              mkdir /var/run/sshd &&
              echo 'root:12345678' | chpasswd && 
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && 
              sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
              /usr/sbin/sshd -D
            "
          
          echo "✅ Container created"
          echo "Waiting 20 seconds for SSH..."
          sleep 20
      
      - name: Verify SSH
        run: |
          # Simple verification
          nc -zv localhost 2222 && echo "✅ Port open" || echo "❌ Port closed"
      
      - name: Get Tunnel URL
        id: tunnel
        run: |
          # Install cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          
          # Start tunnel
          cloudflared tunnel --url ssh://localhost:2222 > tunnel.log 2>&1 &
          sleep 15
          
          # Get URL
          URL=$(grep -o 'https://[a-z-]*\.trycloudflare\.com' tunnel.log | head -1)
          HOST=$(echo $URL | sed 's|https://||')
          
          echo "URL=$URL" >> $GITHUB_OUTPUT
          echo "HOST=$HOST" >> $GITHUB_OUTPUT
          
          echo ""
          echo "========================================="
          echo "    ✅ VPS READY - COPY THIS TO TERMIUS"
          echo "========================================="
          echo ""
          echo "📱 TERMIUS CONNECTION:"
          echo "   Hostname: $HOST"
          echo "   Port:     2222"
          echo "   Username: root"
          echo "   Password: 12345678"
          echo ""
          echo "🔗 SSH Command:"
          echo "   ssh root@$HOST -p 2222"
          echo ""
          echo "⏱️  Active for 6 hours"
          echo "========================================="
          
          sleep 21600
