name: 30-Day Bore Tunnel (VPS Persistent)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  persistent-tunnel:
    # 👇 IMPORTANT: use your self‑hosted runner label
    runs-on: self-hosted
    timeout-minutes: 43200  # 30 days

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust and Cargo
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cargo --version

      - name: Install bore-cli
        run: |
          source ~/.cargo/env
          cargo install bore-cli
          echo "bore-cli installed successfully"

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass net-tools tmux

      - name: Configure SSH for external access
        run: |
          echo "🔧 Making SSH listen on all interfaces and enabling password auth..."
          sudo sed -i 's/^#ListenAddress 0.0.0.0/ListenAddress 0.0.0.0/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          sleep 5

      - name: Find SSH Port
        id: ssh_port
        run: |
          PORT=$(grep -E "^Port" /etc/ssh/sshd_config | awk '{print $2}')
          if [ -z "$PORT" ]; then PORT=22; fi
          echo "SSH_PORT=$PORT" >> $GITHUB_ENV
          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "✅ SSH on port $PORT"

      - name: Set password for runner user
        run: |
          echo "runner:12345678" | sudo chpasswd
          echo "✅ Password set"

      - name: Open firewall (if any)
        run: |
          if command -v ufw &> /dev/null; then
            sudo ufw allow ${{ env.SSH_PORT }}/tcp
            sudo ufw reload
          fi
          if command -v iptables &> /dev/null; then
            sudo iptables -C INPUT -p tcp --dport ${{ env.SSH_PORT }} -j ACCEPT 2>/dev/null || \
            sudo iptables -I INPUT -p tcp --dport ${{ env.SSH_PORT }} -j ACCEPT
          fi
          echo "✅ Firewall rules updated"

      - name: Start persistent bore tunnel inside tmux
        id: bore_tunnel
        run: |
          source ~/.cargo/env
          # Kill any previous tmux session with same name
          tmux kill-session -t bore_tunnel 2>/dev/null || true
          # Create a new detached tmux session that runs the bore tunnel
          tmux new-session -d -s bore_tunnel "bash -c '
            echo \"🚀 Bore tunnel started inside tmux\"
            while true; do
              bore local ${{ env.SSH_PORT }} --to bore.pub
              echo \"Bore exited – restarting in 10 seconds...\"
              sleep 10
            done
          '"
          # Give it a moment to start and capture the public port
          sleep 15
          # Extract the public port from tmux output
          tmux capture-pane -t bore_tunnel -pS -50 > /tmp/bore_output.txt
          BORE_PORT=$(grep -oP 'listening at bore.pub:\K\d+' /tmp/bore_output.txt | head -1)
          if [ -n "$BORE_PORT" ]; then
            echo "BORE_PORT=$BORE_PORT" >> $GITHUB_ENV
            echo "bore_port=$BORE_PORT" >> $GITHUB_OUTPUT
            echo "✅ Bore tunnel established on port $BORE_PORT"
          else
            echo "⚠️ Could not detect public port – check tmux session manually:"
            tmux capture-pane -t bore_tunnel -pS -50
          fi

      - name: Display connection info
        run: |
          echo "═══════════════════════════════════════════"
          echo "🔌 PERSISTENT TUNNEL – 30 DAYS"
          echo "═══════════════════════════════════════════"
          echo "Connect with: ssh -p ${{ env.BORE_PORT }} runner@bore.pub"
          echo "Password: 12345678"
          echo "─────────────────────────────"
          echo "Local SSH port on VPS: ${{ env.SSH_PORT }}"
          echo "─────────────────────────────"
          echo "The tunnel is running inside a tmux session named 'bore_tunnel'."
          echo "To reattach (if you SSH into the VPS): tmux attach -t bore_tunnel"
          echo "═══════════════════════════════════════════"

      - name: Keep runner alive and monitor (optional)
        run: |
          echo "🔄 Runner will now stay alive for 30 days, but the bore tunnel is already safe in tmux."
          echo "Even if this job stops, the tunnel will continue because it's detached."
          # Simple heartbeat to keep the runner session alive (prevents idle disconnect)
          DAY=0
          while [ $DAY -lt 30 ]; do
            for HOUR in {0..23}; do
              for MIN in {0..59}; do
                echo "[$(date)] Runner alive – Day $DAY, $HOUR:$MIN – Tunnel bore.pub:${{ env.BORE_PORT }}"
                sleep 60
              done
            done
            DAY=$((DAY + 1))
          done
          echo "✅ 30 days completed."