name: VPS 30-Day Connection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd traceroute
          # Start SSH service for localhost connections
          sudo systemctl start ssh || sudo service ssh start
          echo "✅ SSH tools installed"
      
      - name: Set VPS Details
        run: |
          # Using localhost IP
          VPS_IP="127.0.0.1"
          VPS_PORT="22"
          VPS_USER="root"
          VPS_PASS="root"
          
          echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          echo "VPS_PORT=$VPS_PORT" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "VPS_PASS=$VPS_PASS" >> $GITHUB_ENV
          
          echo "================================="
          echo "✅ VPS CONNECTION DETAILS"
          echo "================================="
          echo "📌 IP Address: $VPS_IP (localhost)"
          echo "🔌 SSH Port:   $VPS_PORT"
          echo "👤 Username:   $VPS_USER"
          echo "================================="
      
      - name: Setup Local SSH
        run: |
          # Set root password
          echo "root:root" | sudo chpasswd
          
          # Configure SSH to allow root login
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          # Restart SSH
          sudo systemctl restart ssh || sudo service ssh restart
          echo "✅ Local SSH configured"
      
      - name: Test Local Connection
        run: |
          echo "🔍 Testing connection to localhost on port $VPS_PORT..."
          
          # Test 1: Ping test
          echo "📡 Test 1: Ping Test"
          if ping -c 2 -W 3 $VPS_IP > /dev/null 2>&1; then
            echo "   ✅ Localhost is reachable"
          else
            echo "   ⚠️  Localhost ping failed (unusual)"
          fi
          echo ""
          
          # Test 2: Port test
          echo "📡 Test 2: Port $VPS_PORT Test"
          if nc -zv -w 5 $VPS_IP $VPS_PORT 2>&1 | grep -q "succeeded"; then
            echo "   ✅ Port $VPS_PORT is open"
            echo "PORT_OPEN=true" >> $GITHUB_ENV
          else
            echo "   ❌ Port $VPS_PORT is not accessible"
            echo "PORT_OPEN=false" >> $GITHUB_ENV
          fi
      
      - name: Connect to Localhost
        if: env.PORT_OPEN == 'true'
        run: |
          echo "🚀 Connecting to localhost VPS..."
          echo ""
          
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p $VPS_PORT \
            $VPS_USER@$VPS_IP "
            echo '✅ SUCCESSFULLY CONNECTED TO LOCALHOST'
            echo '========================================='
            echo ''
            echo '📋 SYSTEM INFORMATION:'
            echo '  Hostname: ' \$(hostname)
            echo '  OS: ' \$(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')
            echo '  Kernel: ' \$(uname -r)
            echo '  Uptime: ' \$(uptime -p)
            echo ''
            echo '💾 MEMORY USAGE:'
            free -h
            echo ''
            echo '💽 DISK USAGE:'
            df -h
            echo ''
            echo '🌐 IP ADDRESSES:'
            hostname -I
            echo ''
            echo '👥 LOGGED IN USERS:'
            who || echo '  No users'
            echo ''
            echo '📅 CURRENT TIME:'
            date
            echo '========================================='
          " || echo "❌ Connection failed"
      
      - name: Save Log
        if: always()
        run: |
          mkdir -p logs
          echo "Run: ${{ github.run_number }}" > logs/status.txt
          echo "Date: $(date)" >> logs/status.txt
          echo "VPS: $VPS_IP:$VPS_PORT (localhost)" >> logs/status.txt
          echo "Port Open: ${PORT_OPEN:-false}" >> logs/status.txt
          echo "Status: ${{ job.status }}" >> logs/status.txt
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-logs-run-${{ github.run_number }}
          path: logs/
          retention-days: 30
      
      - name: Next Run Info
        run: |
          echo ""
          echo "================================="
          echo "✅ WORKFLOW COMPLETE"
          echo "================================="
          echo "📅 Completed at: $(date)"
          echo "⏰ Next run in: 6 hours"
          echo "📆 30-day schedule: Active"
          echo "🔢 Run #: ${{ github.run_number }}"
          echo "🌐 Connected to: localhost"
          echo "================================="
