name: VPS 30-Day Connection

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  vps-connect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Install SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
      
      - name: Set VPS Details
        run: |
          # !!! REPLACE WITH YOUR ACTUAL VPS IP !!!
          VPS_IP="YOUR_VPS_IP_HERE"
          VPS_USER="root"
          VPS_PASS="root"
          
          echo "VPS_IP=$VPS_IP" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "VPS_PASS=$VPS_PASS" >> $GITHUB_ENV
          
          echo "================================="
          echo "VPS Connection Details:"
          echo "IP: $VPS_IP"
          echo "User: $VPS_USER"
          echo "================================="
      
      - name: Test Connection
        run: |
          echo "Testing connection to $VPS_IP at $(date)"
          ping -c 1 -W 3 $VPS_IP > /dev/null 2>&1 && echo "✅ VPS is reachable" || echo "⚠️ VPS not responding to ping"
      
      - name: Connect to VPS
        run: |
          echo "================================="
          echo "Connecting to VPS at $(date)"
          echo "================================="
          
          sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_IP "
            echo '✅ SUCCESSFULLY CONNECTED'
            echo ''
            echo '📋 SYSTEM INFORMATION:'
            echo '  Hostname: ' \$(hostname)
            echo '  OS: ' \$(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')
            echo '  Kernel: ' \$(uname -r)
            echo '  Uptime: ' \$(uptime -p)
            echo ''
            echo '💾 MEMORY USAGE:'
            free -h
            echo ''
            echo '💽 DISK USAGE:'
            df -h
            echo ''
            echo '🌐 IP ADDRESSES:'
            hostname -I
            echo ''
            echo '👥 LOGGED IN USERS:'
            who || echo '  No users'
            echo ''
            echo '📅 CURRENT TIME:'
            date
          " || echo "❌ Connection failed - Check if VPS is running and IP is correct"
      
      - name: Next Run Info
        run: |
          echo ""
          echo "================================="
          echo "✅ Workflow completed at $(date)"
          echo "⏰ Next run in 6 hours"
          echo "📅 Will run for 30 days"
          echo "================================="
