name: Cloudflare Tunnel SSH - 30 Days

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      setup_mode:
        description: 'Setup mode (install/connect)'
        required: false
        default: 'connect'
        type: choice
        options:
          - install
          - connect

jobs:
  cloudflare-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Install Required Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd curl wget
          echo "✅ Tools installed"
      
      - name: Install Cloudflare Tunnel (First Time)
        if: github.event.inputs.setup_mode == 'install'
        run: |
          echo "========================================="
          echo "🔧 CLOUDFLARE TUNNEL INSTALLATION GUIDE"
          echo "========================================="
          echo ""
          echo "📝 STEP 1: Create Cloudflare Account"
          echo "   1. Go to: https://dash.cloudflare.com/"
          echo "   2. Sign up for free account"
          echo "   3. Add your domain (or use trycloudflare.com for testing)"
          echo ""
          echo "📝 STEP 2: Install cloudflared on your local machine"
          echo "   # Download cloudflared"
          echo "   wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
          echo "   sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared"
          echo "   sudo chmod +x /usr/local/bin/cloudflared"
          echo ""
          echo "📝 STEP 3: Authenticate Cloudflare Tunnel"
          echo "   cloudflared tunnel login"
          echo "   (Follow the URL to authenticate)"
          echo ""
          echo "📝 STEP 4: Create a Tunnel"
          echo "   cloudflared tunnel create ssh-tunnel"
          echo ""
          echo "📝 STEP 5: Configure Tunnel"
          echo "   Edit ~/.cloudflared/config.yml:"
          echo "   tunnel: ssh-tunnel"
          echo "   credentials-file: /home/user/.cloudflared/ssh-tunnel.json"
          echo "   ingress:"
          echo "     - hostname: ssh.yourdomain.com"
          echo "       service: ssh://localhost:22"
          echo "     - service: http_status:404"
          echo ""
          echo "📝 STEP 6: Route DNS"
          echo "   cloudflared tunnel route dns ssh-tunnel ssh.yourdomain.com"
          echo ""
          echo "📝 STEP 7: Run Tunnel"
          echo "   cloudflared tunnel run ssh-tunnel"
          echo ""
          echo "✅ Then connect: ssh root@ssh.yourdomain.com -p 22"
          echo "   Password: 12345678"
          echo "========================================="
      
      - name: Setup SSH with Password
        run: |
          echo "========================================="
          echo "🔐 CONFIGURING SSH WITH PASSWORD"
          echo "========================================="
          echo ""
          
          # Set root password
          echo "root:12345678" | sudo chpasswd
          
          # Configure SSH to allow password login
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          # Restart SSH
          sudo systemctl restart ssh || sudo service ssh restart
          
          echo "✅ SSH configured with password: 12345678"
          echo "✅ Root login enabled"
          echo ""
          echo "📋 Connection Details:"
          echo "   Username: root"
          echo "   Password: 12345678"
          echo "   Port: 22"
      
      - name: Install and Run TryCloudflare Tunnel (Quick Test)
        if: github.event.inputs.setup_mode == 'connect'
        run: |
          echo "========================================="
          echo "🚀 STARTING TRYCLOUDFLARE TUNNEL"
          echo "========================================="
          echo ""
          
          # Download cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          
          # Start tunnel in background
          ./cloudflared-linux-amd64 tunnel --url ssh://localhost:22 &
          TUNNEL_PID=$!
          
          echo "⏱️  Waiting for tunnel to establish..."
          sleep 10
          
          echo ""
          echo "✅ TUNNEL IS RUNNING!"
          echo ""
          echo "🔗 YOUR SSH CONNECTION DETAILS:"
          echo "========================================="
          echo "Username: root"
          echo "Password: 12345678"
          echo ""
          echo "📡 The tunnel URL will appear above"
          echo "   Look for: https://random-name.trycloudflare.com"
          echo ""
          echo "🔌 Connect using:"
          echo "   ssh root@random-name.trycloudflare.com -p 22"
          echo ""
          echo "⏱️  Tunnel runs for 300 seconds (5 minutes)"
          echo ""
          sleep 300
          
          kill $TUNNEL_PID 2>/dev/null || true
          echo "✅ Tunnel closed"
      
      - name: Save Connection Info
        if: always()
        run: |
          mkdir -p logs
          echo "=========================================" > logs/cloudflare.txt
          echo "CLOUDFLARE TUNNEL SSH" >> logs/cloudflare.txt
          echo "=========================================" >> logs/cloudflare.txt
          echo "Date: $(date)" >> logs/cloudflare.txt
          echo "Username: root" >> logs/cloudflare.txt
          echo "Password: 12345678" >> logs/cloudflare.txt
          echo "" >> logs/cloudflare.txt
          echo "To connect: ssh root@YOUR-TUNNEL-URL -p 22" >> logs/cloudflare.txt
          echo "=========================================" >> logs/cloudflare.txt
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
